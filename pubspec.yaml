name: dukaan_ai
description: Dukaan AI - AI Commerce OS for India's 75M SMBs
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ─────────────────────────────────────────
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # ── Immutable Data Classes ───────────────────────────────────
  freezed_annotation: ^3.1.0

  # ── Navigation ───────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Backend / Auth ───────────────────────────────────────────
  firebase_crashlytics: ^4.1.0

  # ── Firebase ─────────────────────────────────────────────────
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.2.1
  firebase_messaging: ^15.2.10
  firebase_storage: ^12.3.6
  firebase_app_check: ^0.3.2+2 

  # ── Payments ─────────────────────────────────────────────────
  razorpay_flutter: ^1.4.3

  # ── Images ───────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  image_picker: ^1.2.1
  image: ^4.8.0
  gal: ^2.3.0

  # ── QR Code ──────────────────────────────────────────────────
  qr_flutter: ^4.1.0

  # ── Animations ───────────────────────────────────────────────
  lottie: ^3.3.2

  # ── Networking ───────────────────────────────────────────────
  http: ^1.6.0
  connectivity_plus: ^6.1.5

  # ── Utilities ────────────────────────────────────────────────
  logger: ^2.7.0
  intl: ^0.19.0
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  mutex: ^3.1.0
  flutter_secure_storage: ^9.2.4
  package_info_plus: ^8.3.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

  # ── UI Extras ────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  shimmer: ^3.0.0
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ──────────────────────────────────────────
  build_runner: ^2.13.1
  freezed: ^3.2.5
  riverpod_generator: ^4.0.3
  json_serializable: ^6.9.5

  # ── Linting ──────────────────────────────────────────────────
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/splash/
    - assets/images/
    - assets/lottie/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FF6F00"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FF6F00"
  image: "assets/splash/logo_white.png"
  android_12:
    color: "#FF6F00"
    image: "assets/splash/logo_white.png"
  android: true
  ios: false